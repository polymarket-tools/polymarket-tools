services:
  - type: web
    name: capitolbets-bot
    runtime: docker
    dockerfilePath: packages/capitolbets/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PRIVY_APP_ID
        sync: false
      - key: PRIVY_APP_SECRET
        sync: false
      - key: FEE_COLLECTION_ADDRESS
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: DATABASE_PATH
        value: /data/capitolbets.db
      - key: PORT
        value: "3000"
      - key: WEBHOOK_SECRET
        sync: false
      - key: NODE_ENV
        value: production
    disk:
      name: capitolbets-data
      mountPath: /data
      sizeGB: 1

  - type: web
    name: capitolbets-n8n
    runtime: docker
    dockerfilePath: packages/capitolbets/Dockerfile.n8n
    dockerContext: .
    plan: starter
    region: oregon
    envVars:
      - key: WEBHOOK_URL
        fromService:
          name: capitolbets-bot
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: WEBHOOK_SECRET
        fromService:
          name: capitolbets-bot
          type: web
          envVarKey: WEBHOOK_SECRET
      - key: OPENAI_API_KEY
        sync: false
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1
